name: profile-assets

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  weekly-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          path: source

      - name: Checkout generated assets
        uses: actions/checkout@v7
        with:
          ref: output
          path: output

      - name: Generate responsive profile assets
        run: node source/.github/scripts/generate-profile-assets.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          PROFILE_LOGIN: Birditch
          WEEKLY_COMMITS_OUTPUT: output/weekly-commits.svg
          CONTRIBUTIONS_OUTPUT: output/contribution-calendar.svg
          GITHUB_BADGE_OUTPUT: output/profile-github.svg
          FOLLOWERS_BADGE_OUTPUT: output/profile-followers.svg
          TIMEZONE_BADGE_OUTPUT: output/profile-timezone.svg
          LANGUAGE_USAGE_OUTPUT: output/language-usage.svg
          ORGANIZATION_OVERVIEW_OUTPUT: output/organization-overview.svg

      - name: Commit updated profile assets
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekly-commits.svg contribution-calendar.svg profile-github.svg profile-followers.svg profile-timezone.svg language-usage.svg organization-overview.svg
          if git diff --cached --quiet; then
            echo "No profile asset changes."
          else
            git commit -m "chore: update generated profile assets"
            git pull --rebase origin output
            git push
          fi
