name: profile-assets

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate weekly commit card
        run: node .github/scripts/generate-weekly-commits.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          PROFILE_LOGIN: Birditch

      - name: Commit updated profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/weekly-commits.svg
          if git diff --cached --quiet; then
            echo "No profile asset changes."
          else
            git commit -m "chore: update weekly profile metrics"
            git push
          fi
