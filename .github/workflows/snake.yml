name: snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout generated assets
        uses: actions/checkout@v7
        with:
          ref: output

      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: Birditch
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark
            ocean.gif?color_snake=orange&color_dots=#bfd7ea,#60a3bc,#1e3799,#0c2461,#0a3d62

      - name: Commit updated snake assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg ocean.gif
          if git diff --cached --quiet; then
            echo "No snake asset changes."
          else
            git commit -m "chore: update contribution snake"
            git pull --rebase origin output
            git push
          fi
