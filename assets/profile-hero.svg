<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Birditch GitHub Profile</title>
  <desc id="desc">Software engineer profile banner focused on backend systems, automation, developer tools, and runtime diagnostics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.46" stop-color="#12233a"/>
      <stop offset="1" stop-color="#17132b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#2ea043"/>
      <stop offset="1" stop-color="#f0b72f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="20" fill="url(#bg)"/>
