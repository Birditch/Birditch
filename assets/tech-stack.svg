<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Birditch technology stack</title>
  <desc id="desc">Technology stack ordered by fluency: Node.js, Java, C#, PHP, C++, Go.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="960" height="220" rx="18" fill="url(#card)" stroke="#30363d"/>
  <text x="48" y="48" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">Stack by fluency</text>
  <text x="48" y="75" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="14">从熟练到持续投入，按当前工程使用习惯排序。</text>

  <g transform="translate(48 108)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif">
    <g>
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#238636"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Node.js</text>
    </g>
    <g transform="translate(146 0)">
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#e76f00"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Java</text>
    </g>
    <g transform="translate(292 0)">
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#7c3aed"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">C#</text>
    </g>
    <g transform="translate(438 0)">
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#4f46e5"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">PHP</text>
    </g>
    <g transform="translate(584 0)">
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#2563eb"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">C++</text>
    </g>
    <g transform="translate(730 0)">
      <rect x="0" y="0" width="134" height="56" rx="8" fill="#0e7490"/>
      <text x="67" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Go</text>
    </g>
  </g>
</svg>
