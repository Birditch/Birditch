<svg xmlns="http://www.w3.org/2000/svg" width="960" height="370" viewBox="0 0 960 370" role="img" aria-labelledby="title desc">
  <title id="title">真实语言使用统计</title>
  <desc id="desc">根据 Birditch 本人和所属组织中实际参与的 52 个一方仓库汇总 GitHub Linguist 语言字节。</desc>
  <rect width="960" height="370" rx="8" fill="#0d1117" stroke="#30363d"/>
